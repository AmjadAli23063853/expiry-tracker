<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product — Expiry Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #2d2d2d; }
    nav { background: #1a1a2e; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    nav .brand { color: #fff; font-size: 18px; font-weight: 600; }
    nav a { color: #a0aec0; text-decoration: none; font-size: 14px; margin-left: 1.5rem; }
    nav a:hover { color: #fff; }
    .container { max-width: 560px; margin: 2.5rem auto; padding: 0 1.5rem; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.5rem; }
    .card { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 13px; font-weight: 500; color: #4a5568; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; background: #fff; color: #2d2d2d; }
    input:focus, select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
    .btn { padding: 11px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }
    .btn-primary { background: #667eea; color: #fff; width: 100%; margin-top: 0.5rem; }
    .btn-primary:hover { background: #5a6fd6; }
    .back { display: inline-block; margin-bottom: 1rem; font-size: 14px; color: #667eea; text-decoration: none; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
<nav>
  <span class="brand">ExpiryTracker</span>
  <div>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('add_product') }}">+ Add Product</a>
  </div>
</nav>
<div class="container">
  <a href="{{ url_for('dashboard') }}" class="back">← Back to Dashboard</a>
  <h1>Edit Product</h1>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" name="name" value="{{ product['name'] }}" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category" required>
          {% for cat in ['Dairy','Bakery','Meat & Poultry','Frozen Foods','Beverages','Snacks','Canned Goods','Produce','Condiments','Other'] %}
            <option {% if product['category'] == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" name="quantity" value="{{ product['quantity'] }}" min="1" required>
      </div>
      <div class="form-group">
        <label>Expiry Date</label>
        <input type="date" name="expiry_date" value="{{ product['expiry_date'] }}" required>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>
</div>
</body>
</html>
